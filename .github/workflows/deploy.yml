name: Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for metadata)
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${VPS_SSH_PORT}" -H "${VPS_SSH_HOST}" >> ~/.ssh/known_hosts
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}

      - name: Deploy
        run: |
          ssh -p "${VPS_SSH_PORT}" -o BatchMode=yes "${VPS_SSH_USER}@${VPS_SSH_HOST}" << EOF
          set -euo pipefail
          cd "${VPS_APP_DIR}"
          bash deploy/deploy.sh
          EOF
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
